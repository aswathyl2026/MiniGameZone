<body>
<nav class="navbar navbar-expand-lg bg-success ">
  <div class="container-fluid">
    <a class="navbar-brand text-warning fw-bolder" href="#">GameZone</a>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ">
        <li class="nav-item">

<section class="gameBody container-fluid">
<h2 class="head">🔥🔥 Play Now !!!🔥🔥</h2>
<h3 id="move" class="text-light"></h3>
<div class="gamecard">
  <h2>✊ Rock Paper Scissors ✋✌</h2>
 


<div class="buttonDiv">
<button onclick="play('Rock')" class="btn btn-danger">Rock</button>
<button onclick="play('Paper')"  class="btn btn-danger">Paper</button>
<button onclick="play('Scissors')"  class="btn btn-danger">Scissors </button>

</div>
<p id="result" class="text-success" hidden></p>
<p id="fail" class="text-danger" hidden></p>
<div id="scoreBoard" class="text-success">

</div>
<a id="scoreSend" onclick="sendScore()" class=" btn btn-success" hidden>Go To Score Board</a>
</div>


</section>
<footer class="bg-success text-white text-center p-3">
