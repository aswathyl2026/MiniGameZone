<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Mini Game Zone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      .scorebody{
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

      }
       
     body {
    margin: 0;
    background: black;
    overflow: scroll;
    }

    .firework {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
     }

@keyframes explode {
    from {
        transform: scale(1);
        opacity: 1;
    }
    to {
        transform: scale(8);
        opacity: 0;
    }
}

h1 {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 40%;
    color: white;
    font-family: Arial;
}

</style>
</head>
